<script>(function(){

else if(d.type==='ss:deactivate'){active=false;restoreSel();selectedSet=[];origClasses=[];place(hoverBox,null);for(var i=0;i<selBoxes.length;i++)place(selBoxes[i],null);document.documentElement.style.cursor='';}

   later deselect/deactivate won't revert it (HMR will re-render it from source). */

window.addEventListener('resize',reposition,true);
})()</script>
